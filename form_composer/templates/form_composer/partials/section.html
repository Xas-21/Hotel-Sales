<div class="form-section" 
     data-section-id="{{ section.id }}"
     data-section-order="{{ section.order }}">
    <div class="section-header">
        <div class="section-title">
            <i class="bi bi-grip-vertical"></i>
            <span class="section-name">{{ section.name }}</span>
            {% if section.is_collapsed %}
            <i class="bi bi-chevron-down collapse-indicator"></i>
            {% else %}
            <i class="bi bi-chevron-up collapse-indicator"></i>
            {% endif %}
        </div>
        <div class="section-actions">
            <button class="btn-sm btn-outline" 
                    onclick="toggleSection({{ section.id }})">
                <i class="bi bi-chevron-{% if section.is_collapsed %}down{% else %}up{% endif %}"></i>
            </button>
            <button class="btn-sm btn-warning" 
                    onclick="editSection({{ section.id }})">
                <i class="bi bi-pencil"></i>
            </button>
            <button class="btn-sm btn-danger" 
                    onclick="deleteSection({{ section.id }})">
                <i class="bi bi-trash"></i>
            </button>
        </div>
    </div>
    <div class="section-body {% if section.is_collapsed %}d-none{% endif %}">
        {% if section.description %}
        <p class="text-muted mb-3">{{ section.description }}</p>
        {% endif %}
        
        <div class="field-list" 
             data-section-id="{{ section.id }}">
            <div class="text-center text-muted py-3">
                <i class="bi bi-inbox"></i><br>
                Drop fields here or click "Add Field"
            </div>
        </div>
        
        <button class="btn btn-outline btn-sm mt-2" 
                onclick="addField({{ section.id }})">
            <i class="bi bi-plus"></i> Add Field
        </button>
    </div>
</div>
